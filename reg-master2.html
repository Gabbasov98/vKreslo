<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <meta name="color-scheme" content="light only">
    <link rel="stylesheet" href="css/swiper-bundle.min.css">
    <link rel="stylesheet" href="css/style.min.css">
    <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
    <title>Зарегистрироваться</title>
</head>


<body class="m-page">
    <div class="wrapper">
        <header class="header-login">
            <div class="container">
                <div class="header-login__inner _flex-center">
                    <a href="" class="header-login__back m-round-btn m-btn-gray">
                        <img src="img/back.svg" alt="">
                    </a>
                    <a href="" class="header-login__logo">
                        <img src="img/logo.svg" alt="">
                    </a>
                </div>
            </div>

        </header>
        <main class="content">

            <div class="auth">
                <div class="container">
                    <div class="auth__inner">
                        <div class="h2 h2-mob-big regular-text text-center">
                            Введите данные для мастера
                        </div>
                        <form class="auth-form auth-form--big2">
                            <div class="auth-form__fields">
                                <div class="fg">
                                    <label>Email или номер телефона</label>
                                    <input type="text" placeholder="введите email">
                                </div>
                            </div>
                            <div class="auth-form__nav">
                                <button class="auth-form__btn m-btn m-btn-blue">
                                    <span>Войти</span>
                                </button>
                                <button class="auth-form__btn m-btn m-btn-black-outline">
                                    <span>Уже есть аккаунт</span>
                                </button>
                            </div>
                            <div class="_mt20 text-center">
                                <div class="text18 text16-tablet lsp1 gray-text">
                                    Входя на данный ресурс вы соглашаетесь с:
                                </div>
                            </div>
                            <div class="auth-form__checks">
                                <div class="m-check">
                                    <input type="checkbox">
                                    <label><span>Согласен с политикой обработки персональных данных</span></label>
                                </div>
                                <div class="m-check">
                                    <input type="checkbox">
                                    <label><span>Согласен с на обработку персональных данных</span></label>
                                </div>
                            </div>
                            <div class="auth-alternative">
                                <a href="" class="auth-alternative__link m-btn m-btn-gray-outline">
                                    <img src="img/ya.webp" alt="">
                                    <span>Войти через яндекс</span>
                                </a>
                                <a href="" class="auth-alternative__link m-btn m-btn-gray-outline">
                                    <img src="img/vk.webp" alt="">
                                    <span>Войти через Вконтакте</span>
                                </a>
                                <a href="" class="auth-alternative__link m-btn m-btn-gray-outline">
                                    <img src="img/gu.webp" alt="">
                                    <span>Войти через ГосУслуги</span>
                                </a>
                                <a href="" class="auth-alternative__link m-btn m-btn-gray-outline">
                                    <img src="img/max.webp" alt="">
                                    <span>Войти через Max</span>
                                </a>
                            </div>

                        </form>
                    </div>
                </div>
                <div class="progress-pag _mt40">
                    <span class="progress-pag__item"></span>
                    <span class="progress-pag__item _active"></span>
                    <span class="progress-pag__item"></span>
                    <span class="progress-pag__item"></span>
                </div>
            </div>

        </main>
        <footer class="footer footer--hide-tablet">
            <div class="container">
                <div class="footer__inner">
                    <div class="footer-nav">
                        <ul>
                            <li><a href="">О проекте</a></li>
                            <li><a href="">Для кого</a></li>
                            <li><a href="">Функционал</a></li>
                            <li><a href="">Вопросы и ответы</a></li>
                            <li><a href="">Блог</a></li>
                        </ul>
                    </div>
                    <a href="" class="footer__logo">
                        <img src="img/logo.svg" alt="">
                    </a>
                    <div class="socials">
                        <a href="" class="socials__item">
                            <img src="img/fb.svg" alt="">
                        </a>
                        <a href="" class="socials__item">
                            <img src="img/twitter.svg" alt="">
                        </a>
                        <a href="" class="socials__item">
                            <img src="img/ig.svg" alt="">
                        </a>
                        <a href="" class="socials__item">
                            <img src="img/in.svg" alt="">
                        </a>
                    </div>

                    <div class="footer__c">
                        <div class="text24 text18-laptop text16-mob medium-text lsp1">
                            © “Вкресло.ру”, 2026. Все права защищены
                        </div>
                    </div>
                </div>
            </div>

        </footer>
    </div>

    <script src="js/jquery.min.js"></script>
    <script src="js/swiper-bundle.min.js"></script>
    <script src="js/main.min.js"></script>

</body>

</html>
